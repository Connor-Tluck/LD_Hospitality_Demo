# Uploads flag → code references to LaunchDarkly (flag detail UI: "Code references").
# Prerequisites:
#   1. GitHub repo secrets: LD_ACCESS_TOKEN (API token with Writer), LD_PROJECT_KEY (LaunchDarkly project key).
#   2. Token: https://app.launchdarkly.com/settings/authorization
#
# After each push to main, the job scans this repo and links flag keys in code to your LD project.
name: LaunchDarkly code references

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  launchDarklyCodeReferences:
    name: Find flag code references
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 11

      - name: LaunchDarkly code references
        uses: launchdarkly/find-code-references@v2.14.0
        with:
          accessToken: ${{ secrets.LD_ACCESS_TOKEN }}
          projKey: ${{ secrets.LD_PROJECT_KEY }}
          contextLines: 2
          repoName: ${{ github.repository }}
          baseUri: https://app.launchdarkly.com
